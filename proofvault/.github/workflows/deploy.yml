name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests
      run: npm run test
      env:
        DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    
    - name: Run lint
      run: npm run lint
    
    - name: Run type check
      run: npm run type-check

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate Prisma client
      run: npx prisma generate
    
    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        DIRECT_URL: ${{ secrets.DIRECT_URL }}
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    
    - name: Run database migrations
      run: npx prisma migrate deploy
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        DIRECT_URL: ${{ secrets.DIRECT_URL }}
    
    - name: Build Docker image
      run: |
        docker build -t ghcr.io/proofvault/proofvault:${{ github.sha }} .
        docker tag ghcr.io/proofvault/proofvault:${{ github.sha }} ghcr.io/proofvault/proofvault:latest
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Push Docker image
      run: |
        docker push ghcr.io/proofvault/proofvault:${{ github.sha }}
        docker push ghcr.io/proofvault/proofvault:latest
    
    - name: Deploy to Koyeb
      run: |
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.KOYEB_TOKEN }}" \
          -H "Content-Type: application/json" \
          https://app.koyeb.com/v1/services \
          -d '{
            "service": {
              "name": "proofvault",
              "definition": {
                "type": "web",
                "ports": [{"port": 3000}],
                "env": [
                  {"name": "NODE_ENV", "value": "production"},
                  {"name": "NEXT_PUBLIC_SUPABASE_URL", "secret": "SUPABASE_URL"},
                  {"name": "NEXT_PUBLIC_SUPABASE_ANON_KEY", "secret": "SUPABASE_ANON_KEY"},
                  {"name": "SUPABASE_SERVICE_ROLE_KEY", "secret": "SUPABASE_SERVICE_ROLE_KEY"},
                  {"name": "SUPABASE_JWT_SECRET", "secret": "SUPABASE_JWT_SECRET"},
                  {"name": "DATABASE_URL", "secret": "DATABASE_URL"},
                  {"name": "DIRECT_URL", "secret": "DIRECT_URL"},
                  {"name": "R2_ACCOUNT_ID", "secret": "R2_ACCOUNT_ID"},
                  {"name": "R2_ACCESS_KEY_ID", "secret": "R2_ACCESS_KEY_ID"},
                  {"name": "R2_SECRET_ACCESS_KEY", "secret": "R2_SECRET_ACCESS_KEY"},
                  {"name": "R2_BUCKET_NAME", "secret": "R2_BUCKET_NAME"},
                  {"name": "RESEND_API_KEY", "secret": "RESEND_API_KEY"},
                  {"name": "POSTHOG_API_KEY", "secret": "POSTHOG_API_KEY"},
                  {"name": "POSTHOG_HOST", "secret": "POSTHOG_HOST"},
                  {"name": "STRIPE_SECRET_KEY", "secret": "STRIPE_SECRET_KEY"},
                  {"name": "STRIPE_WEBHOOK_SECRET", "secret": "STRIPE_WEBHOOK_SECRET"},
                  {"name": "SENTRY_DSN", "secret": "SENTRY_DSN"},
                  {"name": "LOG_LEVEL", "value": "info"}
                ],
                "image": {
                  "registry_secrets": [],
                  "commands": [],
                  "args": [],
                  "image": "ghcr.io/proofvault/proofvault:${{ github.sha }}"
                },
                "health_checks": [
                  {
                    "type": "http",
                    "path": "/api/health",
                    "port": 3000,
                    "initial_delay_seconds": 30,
                    "timeout_seconds": 5,
                    "period_seconds": 10,
                    "success_threshold": 1,
                    "failure_threshold": 3
                  }
                ]
              }
            }
          }'